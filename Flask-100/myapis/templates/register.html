{% extends "base.html" %}
{% block content %}
  <body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500">

  <div class="w-full max-w-md bg-white/20 backdrop-blur-lg shadow-2xl rounded-2xl p-8 border border-white/30">
    
    <h2 class="text-3xl font-bold text-center text-white mb-6">
      Create Account
    </h2>

    <form action="/create-account" method="POST" enctype="multipart/form-data" class="space-y-5">
      
      <div>
        <label class="block text-white font-medium mb-1">Customer Ac No.</label>
        <input required type="text" name="cus_ac_no"
          class="w-full px-4 py-2 rounded-lg bg-white/80 focus:bg-white outline-none focus:ring-2 focus:ring-indigo-500 transition duration-300"
          placeholder="Enter Your Ac no.">
      </div>

      <div>
        <label class="block text-white font-medium mb-1">Customer Name</label>
        <input type="text" name="cus_name"
          class="w-full px-4 py-2 rounded-lg bg-white/80 focus:bg-white outline-none focus:ring-2 focus:ring-indigo-500 transition duration-300"
          placeholder="Enter Your Name">
      </div>

      <div>
        <label class="block text-white font-medium mb-1">Customer Mobile</label>
        <input type="text" name="cus_mob"
          class="w-full px-4 py-2 rounded-lg bg-white/80 focus:bg-white outline-none focus:ring-2 focus:ring-indigo-500 transition duration-300"
          placeholder="Enter Your mob no.">
      </div>

      <div>
        <label class="block text-white font-medium mb-1">Customer Address</label>
        <textarea rows="4" name="cus_add"
          class="w-full px-4 py-2 rounded-lg bg-white/80 focus:bg-white outline-none focus:ring-2 focus:ring-indigo-500 transition duration-300"
          placeholder="Enter Your Address"></textarea>
      </div>

      <div>
        <label class="block text-white font-medium mb-1">Upload Image</label>
        <input type="file" name="profile_img"
          class="w-full text-white file:mr-4 file:py-2 file:px-4
                 file:rounded-lg file:border-0
                 file:text-sm file:font-semibold
                 file:bg-indigo-600 file:text-white
                 hover:file:bg-indigo-700 cursor-pointer">
      </div>

      <div class="flex gap-4 pt-3">
        <button type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg shadow-lg transition duration-300">
          Send Data
        </button>

        <button type="reset"
          class="w-full bg-white text-indigo-600 font-semibold py-2 rounded-lg shadow-lg hover:bg-gray-100 transition duration-300">
          Reset
        </button>
      </div>

    </form>
  </div>

</body>
{% endblock content %}
